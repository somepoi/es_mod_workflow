name: Build Docker Images

# Сборка и публикация общих образов (ESTool converter + MEGAcmd uploader + GDrive uploader) в GHCR.
# Триггерится в этом репозитории при изменении Dockerfile / ESTool / entrypoint.
# Полученные образы используются workflow_call'ом build_mobile.yml для любого мода.
#
# Стратегия тегирования: единственный тег :latest, перезаписывается каждым билдом.
# Старые манифесты становятся untagged и удаляются финальным шагом prune,
# чтобы в GHCR всегда висел ровно один образ на каждый пакет.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '*.Dockerfile'
      - 'ESTool/**'
      - 'docker-entrypoint.sh'
      - '.github/workflows/build_docker_images.yml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CONVERTER_IMAGE: ghcr.io/${{ github.repository_owner }}/es_mod_workflow-estool-converter
  MEGACMD_IMAGE: ghcr.io/${{ github.repository_owner }}/es_mod_workflow-megacmd
  GDRIVE_IMAGE: ghcr.io/${{ github.repository_owner }}/es_mod_workflow-gdrive

jobs:
  build-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Converter image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./estool.Dockerfile
          push: true
          tags: ${{ env.CONVERTER_IMAGE }}:latest
          provenance: false
          sbom: false
          cache-from: type=gha,scope=converter
          cache-to: type=gha,scope=converter,mode=max

      - name: Build and push MEGAcmd image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./megacmd.Dockerfile
          push: true
          tags: ${{ env.MEGACMD_IMAGE }}:latest
          provenance: false
          sbom: false
          cache-from: type=gha,scope=megacmd
          cache-to: type=gha,scope=megacmd,mode=max

      - name: Build and push Google Drive image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./gdrive.Dockerfile
          push: true
          tags: ${{ env.GDRIVE_IMAGE }}:latest
          provenance: false
          sbom: false
          cache-from: type=gha,scope=gdrive
          cache-to: type=gha,scope=gdrive,mode=max

      - name: Prune untagged image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: es_mod_workflow-estool-converter
          package-type: container
          delete-only-untagged-versions: true
          min-versions-to-keep: 0

      - name: Prune untagged MEGAcmd versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: es_mod_workflow-megacmd
          package-type: container
          delete-only-untagged-versions: true
          min-versions-to-keep: 0

      - name: Prune untagged GDrive versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: es_mod_workflow-gdrive
          package-type: container
          delete-only-untagged-versions: true
          min-versions-to-keep: 0
