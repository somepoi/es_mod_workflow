name: Build Docker Images

# Сборка и публикация общих образов (ESTool converter + MEGAcmd uploader) в GHCR.
# Триггерится в этом репозитории при изменении Dockerfile / ESTool / entrypoint.
# Полученные образы используются workflow_call'ом build_mobile.yml для любого мода.

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no relevant files changed'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - '*.Dockerfile'
      - 'ESTool/**'
      - 'docker-entrypoint.sh'
      - '.github/workflows/build_docker_images.yml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CONVERTER_IMAGE: ghcr.io/${{ github.repository_owner }}/es_mod_workflow-estool-converter
  MEGACMD_IMAGE: ghcr.io/${{ github.repository_owner }}/es_mod_workflow-megacmd

jobs:
  build-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Converter
        id: meta-converter
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CONVERTER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Converter image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./estool.Dockerfile
          push: true
          tags: ${{ steps.meta-converter.outputs.tags }}
          labels: ${{ steps.meta-converter.outputs.labels }}
          cache-from: type=registry,ref=${{ env.CONVERTER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.CONVERTER_IMAGE }}:buildcache,mode=max

      - name: Extract metadata for MEGAcmd
        id: meta-megacmd
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MEGACMD_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push MEGAcmd image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./megacmd.Dockerfile
          push: true
          tags: ${{ steps.meta-megacmd.outputs.tags }}
          labels: ${{ steps.meta-megacmd.outputs.labels }}
          cache-from: type=registry,ref=${{ env.MEGACMD_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.MEGACMD_IMAGE }}:buildcache,mode=max
