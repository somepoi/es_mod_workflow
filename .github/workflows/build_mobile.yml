name: Build Mobile Port

# Reusable workflow для сборки мобильного порта любого мода ES.
# Использует общие образы ghcr.io/<owner>/es_mod_workflow-estool-converter и -megacmd,
# которые билдятся отдельно (см. build_docker_images.yml).

on:
  workflow_call:
    inputs:
      project_name:
        description: "Название мода (определяет имя папки в /app, имя архива и virtual_root в ESTool)"
        required: true
        type: string
      upload_to_mega:
        description: "Загружать ли итоговый архив на MEGA"
        required: false
        type: boolean
        default: false
      upload_to_gdrive:
        description: "Загружать ли итоговый архив на Google Drive"
        required: false
        type: boolean
        default: false
      install_autoinit:
        description: "Скачать последний релиз https://github.com/somepoi/autoinit и положить его в папку проекта"
        required: false
        type: boolean
        default: false
      image_owner:
        description: "Владелец GHCR-неймспейса с образами es_mod_workflow-* (по умолчанию somepoi)"
        required: false
        type: string
        default: "somepoi"
      image_tag:
        description: "Тег образов converter/megacmd"
        required: false
        type: string
        default: "latest"
      artifact_retention_days:
        description: "Сколько дней хранить артефакт сборки"
        required: false
        type: number
        default: 7
    secrets:
      MEGA_USERNAME:
        description: "Логин MEGA"
        required: false
      MEGA_PASSWORD:
        description: "Пароль MEGA"
        required: false
      MEGA_FOLDER:
        description: "Папка на MEGA, в которую загрузить архив"
        required: false
      GDRIVE_SERVICE_ACCOUNT_JSON:
        description: "JSON ключа сервисного аккаунта Google Drive (base64-кодированный)"
        required: false
      GDRIVE_FOLDER_ID:
        description: "ID папки на Google Drive, в которую загрузить архив"
        required: false

permissions:
  contents: read
  packages: read

env:
  CONVERTER_IMAGE: ghcr.io/${{ inputs.image_owner }}/es_mod_workflow-estool-converter:${{ inputs.image_tag }}
  MEGACMD_IMAGE: ghcr.io/${{ inputs.image_owner }}/es_mod_workflow-megacmd:${{ inputs.image_tag }}
  GDRIVE_IMAGE: ghcr.io/${{ inputs.image_owner }}/es_mod_workflow-gdrive:${{ inputs.image_tag }}

jobs:
  build:
    name: Build & Upload
    runs-on: ubuntu-latest

    steps:
      - name: Pre-flight validate upload secrets
        env:
          UPLOAD_MEGA: ${{ inputs.upload_to_mega }}
          UPLOAD_GDRIVE: ${{ inputs.upload_to_gdrive }}
          MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          fail=0
          if [ "${UPLOAD_MEGA}" = "true" ] && { [ -z "${MEGA_USERNAME}" ] || [ -z "${MEGA_PASSWORD}" ]; }; then
            echo "::error::upload_to_mega=true, но секреты MEGA_USERNAME/MEGA_PASSWORD не переданы"
            fail=1
          fi
          if [ "${UPLOAD_GDRIVE}" = "true" ] && { [ -z "${GDRIVE_SERVICE_ACCOUNT_JSON}" ] || [ -z "${GDRIVE_FOLDER_ID}" ]; }; then
            echo "::error::upload_to_gdrive=true, но секреты GDRIVE_SERVICE_ACCOUNT_JSON/GDRIVE_FOLDER_ID не переданы"
            fail=1
          fi
          exit "$fail"

      - name: Checkout caller repository
        uses: actions/checkout@v6.0.3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run mobile conversion
        run: |
          mkdir -p output
          docker run --rm \
            -e PROJECT_NAME='${{ inputs.project_name }}' \
            -v "${{ github.workspace }}:/app/source:ro" \
            -v "${{ github.workspace }}/output:/output" \
            "${CONVERTER_IMAGE}"

      - name: Install autoinit
        if: ${{ inputs.install_autoinit }}
        env:
          PROJECT_NAME: ${{ inputs.project_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          MOD_DIR="output/${PROJECT_NAME}"
          if [ ! -d "${MOD_DIR}" ]; then
            echo "::error::Папка ${MOD_DIR} не найдена в мобильном порте, autoinit устанавливать некуда"
            exit 1
          fi
          AUTOINIT_DIR="${MOD_DIR}/autoinit"
          mkdir -p "${AUTOINIT_DIR}"

          TMP=$(mktemp -d)
          # Качаем zip-архив исходников последнего релиза через официальный gh CLI
          # (предустановлен на ubuntu-latest, без аргумента tag берёт latest release)
          gh release download \
            --repo somepoi/autoinit \
            --archive=zip \
            --dir "${TMP}"

          ARCHIVE=$(find "${TMP}" -maxdepth 1 -name '*.zip' | head -n1)
          [ -n "${ARCHIVE}" ] || { echo "::error::gh release download не вернул zip"; exit 1; }

          unzip -q "${ARCHIVE}" -d "${TMP}/extracted"
          INNER=$(find "${TMP}/extracted" -mindepth 1 -maxdepth 1 -type d | head -n1)
          [ -n "${INNER}" ] || { echo "::error::Не удалось найти содержимое архива autoinit"; exit 1; }

          # Чистим то, что не нужно тащить в мод
          rm -rf "${INNER}/.git" "${INNER}/.github"
          rm -f "${INNER}/.gitattributes" "${INNER}/.gitignore" \
                "${INNER}/README.md" "${INNER}/example.rpy"

          cp -r "${INNER}/." "${AUTOINIT_DIR}/"
          rm -rf "${TMP}"
          echo "autoinit установлен в ${AUTOINIT_DIR}"

      - name: Create archive
        run: |
          cd output
          zip -r "../${{ inputs.project_name }}.zip" "${{ inputs.project_name }}"

      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_name }}_mobile
          path: ${{ inputs.project_name }}.zip
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Upload to MEGA
        if: ${{ inputs.upload_to_mega }}
        env:
          PROJECT_NAME: ${{ inputs.project_name }}
          MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
          MEGA_FOLDER: ${{ secrets.MEGA_FOLDER }}
        run: |
          MEGA_FOLDER_VALUE="${MEGA_FOLDER:-/}"
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -e MEGA_USERNAME \
            -e MEGA_PASSWORD \
            -e MEGA_FOLDER="${MEGA_FOLDER_VALUE}" \
            -e PROJECT_NAME \
            "${MEGACMD_IMAGE}" \
            sh -c '
              set -e
              mega-login "$MEGA_USERNAME" "$MEGA_PASSWORD"
              mega-put "/data/${PROJECT_NAME}.zip" "$MEGA_FOLDER"
              MEGA_URL=$(mega-export -a "$MEGA_FOLDER/${PROJECT_NAME}.zip" | grep -o "https.*")
              echo "File uploaded to MEGA: $MEGA_URL"
              mega-logout
            '

      - name: Upload to Google Drive
        if: ${{ inputs.upload_to_gdrive }}
        env:
          PROJECT_NAME: ${{ inputs.project_name }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          RCLONE_CFG_DIR="${RUNNER_TEMP}/rclone"
          mkdir -p "${RCLONE_CFG_DIR}"
          echo "${GDRIVE_SERVICE_ACCOUNT_JSON}" | base64 --decode > "${RCLONE_CFG_DIR}/sa.json"
          cat > "${RCLONE_CFG_DIR}/rclone.conf" <<EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_file = /config/sa.json
          root_folder_id = ${GDRIVE_FOLDER_ID}
          EOF
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -v "${RCLONE_CFG_DIR}:/config:ro" \
            -e PROJECT_NAME \
            "${GDRIVE_IMAGE}" \
            --config /config/rclone.conf copy "/data/${PROJECT_NAME}.zip" "gdrive:" --progress
          echo "File uploaded to Google Drive folder: ${GDRIVE_FOLDER_ID}"

      - name: Cleanup gdrive credentials
        if: ${{ always() && inputs.upload_to_gdrive }}
        run: rm -rf "${RUNNER_TEMP}/rclone"
